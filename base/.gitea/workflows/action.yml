inputs:
  ip:
    required: true
    type: string
  id:
    required: true
    type: number
  hostname:
    required: true
    type: string
  cores:
    required: true
    type: number
  memory:
    required: true
    type: number
  swap:
    required: true
    type: number
  disk:
    required: true
    type: string
  boot:
    required: true
    type: string
  mount:
    required: true
    type: string

# Overwrite

  share: # config: network share
    required: false
    default: false
    type: boolean

  dir:
    required: no
    default: "/tmp/config"
    type: string

runs:
  using: "composite"
  steps:
    - uses: tasks/checkout@v6
      with:
        repository: main/base
        ref: 'main'
    - run: |
        ansible-playbook default.yml -e "ip=${{ inputs.ip }}" -e "id=${{ inputs.id }}" \
          -e "hostname=${{ inputs.hostname }}" -e "cores=${{ inputs.cores }}" -e "memory=${{ inputs.memory }}" \
          -e "swap=${{ inputs.swap }}" -e "disk=${{ inputs.disk }}" -e "boot=${{ inputs.boot }}" \
          -e "mount=${{ inputs.mount }}" -e "share=${{ env.PROXMOX_PASSWORD && inputs.share || 'false' }}"

      env:
        HOST: ${{ vars.HOST }}
        LOGIN: ${{ vars.LOGIN }}
        PASSWORD: ${{ vars.PASSWORD }}
        PROXMOX_HOST: ${{ vars.PROXMOX_HOST }}
        PROXMOX_USER: ${{ vars.PROXMOX_USER }}
        PROXMOX_PASSWORD: ${{ vars.PROXMOX_PASSWORD }}
        PROXMOX_TOKEN: ${{ vars.PROXMOX_TOKEN }}
        PROXMOX_SECRET: ${{ vars.PROXMOX_SECRET }}
        
        PROXMOX_NODE: ${{ vars.PROXMOX_NODE || 'pve' }}
        PROXMOX_DIR: ${{ vars.PROXMOX_DIR || '/tmp/config' }}
        PROXMOX_SHARE: ${{ vars.PROXMOX_SHARE || '/share' }}
        PROXMOX_STORAGE: ${{ vars.PROXMOX_STORAGE || 'local:vztmpl' }}
        PROXMOX_TEMPLATE: ${{ vars.PROXMOX_TEMPLATE || 'debian-13-standard_13.1-2' }}
        PROXMOX_GATEWAY: ${{ vars.PROXMOX_GATEWAY || '192.168.178.1' }}
        PROXMOX_MASK: ${{ vars.PROXMOX_MASK || '24' }}
        PROXMOX_INTERFACE: ${{ vars.PROXMOX_INTERFACE || 'eth0' }}
        PROXMOX_BRIDGE: ${{ vars.PROXMOX_BRIDGE || 'vmbr0' }}
